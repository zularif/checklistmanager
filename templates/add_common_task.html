{% extends 'base.html' %}
{% block title %}Add Common Task{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add Common Task</h2>
</div>
<p class="page-intro">Common tasks are general maintenance or ad-hoc jobs &mdash; not routine inspection items.</p>

<div class="form-card">
    <form method="POST" action="{{ url_for('add_common_task') }}">
        <div class="form-group">
            <label for="title">Task Title <span class="required">*</span></label>
            <input type="text" id="title" name="title" placeholder="e.g. Replace faulty light in server room"
                   required value="{{ request.form.get('title', '') }}">
        </div>
        <div class="form-group">
            <label for="description">Description <span class="optional">(optional)</span></label>
            <textarea id="description" name="description" rows="3"
                      placeholder="Additional details about this task...">{{ request.form.get('description', '') }}</textarea>
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option value="High"   {% if request.form.get('priority', 'Medium') == 'High' %}selected{% endif %}>High</option>
                <option value="Medium" {% if request.form.get('priority', 'Medium') == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Low"    {% if request.form.get('priority', 'Medium') == 'Low' %}selected{% endif %}>Low</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Task</button>
            <a href="{{ url_for('common_tasks') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
